openapi: 3.1.0
info:
  title: Tatiana VkusVill Cart Action
  version: 1.0.0
  description: Creates a VkusVill cart link from an approved shopping list.
servers:
  - url: https://tati-home-manager-production.up.railway.app
paths:
  /health:
    get:
      operationId: health
      summary: Health check
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string
  /create-vkusvill-cart:
    post:
      operationId: createVkusvillCart
      summary: Create a VkusVill cart link from a shopping list
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shopping_list_text:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      quantity:
                        type: string
                      notes:
                        type: string
                    required:
                      - name
      responses:
        '200':
          description: Cart creation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  text:
                    type: string
                  cart_link:
                    type: string
                  added_items:
                    type: array
                    items:
                      type: string
                  not_found:
                    type: array
                    items:
                      type: string
