services:
  - type: web
    name: tatiana-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: VKUSVILL_MCP_URL
        value: https://mcp001.vkusvill.ru/mcp
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_TELEGRAM_CHAT_ID
        sync: false
